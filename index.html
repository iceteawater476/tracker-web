<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0e0f13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finals">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.svg">
<title>Finals Tracker</title>

<style>
/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
:root {
  --bg:      #0e0f13;
  --surface: #16181f;
  --surface2:#1e2029;
  --border:  #2a2d3a;
  --accent:  #7c6aff;
  --accent2: #ff6a8a;
  --accent3: #6affd4;
  --text:    #e8e9f0;
  --muted:   #6b6e80;
  --done:    #6affd4;
  --revised: #7c6aff;
  --todo:    #ff6a8a;
  --warn:    #ffb86a;
  --nav-h:   64px;
  --safe-b:  env(safe-area-inset-bottom, 0px);
  --safe-t:  env(safe-area-inset-top, 0px);
}
/* ── Light theme ── */
html.light {
  --bg:      #f0f2f8;
  --surface: #ffffff;
  --surface2:#e8ebf4;
  --border:  #d0d5e8;
  --accent:  #6357e8;
  --accent2: #e8335a;
  --accent3: #0aad8a;
  --text:    #1a1c2e;
  --muted:   #7a7e99;
  --done:    #0aad8a;
  --revised: #6357e8;
  --todo:    #e8335a;
  --warn:    #d97706;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family:'SF Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace;
  overscroll-behavior: none;
}

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

/* ── Top header ── */
.app-header {
  flex-shrink: 0;
  padding: calc(var(--safe-t) + 14px) 20px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
}
.logo { font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif; font-weight:800; font-size:1.25rem; letter-spacing:-0.03em; }
.logo span { color: var(--accent); }
.hdr-right { display:flex; align-items:center; gap:10px; }
.hdr-date { font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
.theme-toggle {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  width: 44px; height: 24px;
  position: relative;
  cursor: pointer;
  transition: background 0.25s, border-color 0.25s;
  flex-shrink: 0;
}
.theme-toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--muted);
  transition: transform 0.25s, background 0.25s;
}
html.light .theme-toggle { background: #e0e7ff; border-color: var(--accent); }
html.light .theme-toggle::after { transform: translateX(20px); background: var(--accent); }
.theme-icon { font-size: 0.9rem; }

/* ── Screen container ── */
.screens {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px calc(var(--nav-h) + var(--safe-b) + 20px);
  display: none;
  animation: fadeUp 0.22s ease;
}
.screen.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* ── Bottom nav ── */
.bottom-nav {
  flex-shrink: 0;
  position: relative;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-b);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 4px;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-family:'SF Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: color 0.15s;
  position: relative;
}
.nav-btn.active { color: var(--accent); }
.nav-btn .nav-icon { font-size: 1.3rem; line-height: 1; }
.nav-btn::after {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--accent);
  border-radius: 0 0 3px 3px;
  transform: scaleX(0);
  transition: transform 0.2s;
}
.nav-btn.active::after { transform: scaleX(1); }

/* ══════════════════════════════════════
   COMMON COMPONENTS
══════════════════════════════════════ */
.section-label {
  font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--muted); margin-bottom: 10px; margin-top: 4px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
}
.card-sm {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
}

/* Input */
.input-row { display:flex; gap:8px; }
input[type="text"] {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family:'SF Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace; font-size:0.85rem;
  padding: 12px 14px; border-radius: 10px; flex:1; outline:none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
input[type="text"]:focus { border-color: var(--accent); }
input[type="text"]::placeholder { color: var(--muted); }

.btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family:'SF Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace; font-size:0.78rem;
  padding: 10px 16px; border-radius: 10px; cursor:pointer; transition:all 0.15s;
  text-transform:uppercase; letter-spacing:0.08em; white-space:nowrap;
  -webkit-appearance:none;
}
.btn:active { opacity: 0.75; transform: scale(0.97); }
.btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn.danger  { background:var(--accent2); border-color:var(--accent2); color:#fff; }
.btn.lg {
  width: 100%; padding: 14px; font-size: 0.85rem;
  border-radius: 12px; text-align: center;
}
.btn.ghost { background:transparent; }

/* Progress bar */
.prog-track {
  height: 6px; background: var(--border); border-radius:99px;
  overflow:hidden; position:relative;
}
.prog-done {
  position:absolute; top:0; left:0; height:100%;
  background:var(--done); border-radius:99px;
  transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
}
.prog-revised {
  position:absolute; top:0; height:100%;
  background:var(--revised); border-radius:99px;
  transition: width 0.45s cubic-bezier(0.4,0,0.2,1), left 0.45s cubic-bezier(0.4,0,0.2,1);
}
.big-prog-track {
  height: 12px; background: var(--border); border-radius:99px;
  overflow:hidden; position:relative;
}

/* Stat pills */
.pills { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.pill {
  font-size:0.68rem; padding:3px 10px; border-radius:99px;
  border:1px solid; text-transform:uppercase; letter-spacing:0.06em;
}
.pill-todo    { border-color:var(--todo);    color:var(--todo);    background:rgba(255,106,138,0.08); }
.pill-done    { border-color:var(--done);    color:var(--done);    background:rgba(106,255,212,0.08); }
.pill-revised { border-color:var(--revised); color:var(--revised); background:rgba(124,106,255,0.08); }

/* Toast */
.toast {
  position:fixed; bottom:calc(var(--nav-h) + var(--safe-b) + 12px); left:50%;
  transform:translateX(-50%);
  background:var(--surface2); border:1px solid var(--accent);
  color:var(--text); padding:10px 20px; border-radius:99px;
  font-size:0.8rem; z-index:9999; white-space:nowrap;
  animation: toastPop 0.3s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
@keyframes toastPop { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* Ring */
.ring-wrap { position:relative; }
.ring-svg { transform:rotate(-90deg); }
.ring-bg   { fill:none; stroke:var(--border); stroke-width:7; }
.ring-fill { fill:none; stroke-width:7; stroke-linecap:round; transition:stroke-dashoffset 0.5s cubic-bezier(0.4,0,0.2,1); }
.ring-lbl {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif; font-weight:700;
}

/* Empty state */
.empty { text-align:center; padding:40px 20px; color:var(--muted); }
.empty .e-icon { font-size:2.5rem; margin-bottom:12px; }
.empty strong { font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif; color:var(--text); display:block; font-size:1rem; margin-bottom:6px; }

/* Back button */
.back-btn {
  display:flex; align-items:center; gap:6px;
  background:none; border:none; color:var(--accent);
  font-family:'SF Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace; font-size:0.8rem;
  cursor:pointer; padding:0 0 16px; text-transform:uppercase; letter-spacing:0.08em;
}
.back-btn:active { opacity:0.7; }

/* ══════════════════════════════════════
   SCREEN 1 — SUBJECTS
══════════════════════════════════════ */
.subject-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.15s;
  display: flex; align-items: flex-start; gap: 10px;
  -webkit-tap-highlight-color: transparent;
}
.subject-card:active { background: var(--surface2); }
.subj-info { flex:1; min-width:0; }
.subj-name { font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif; font-size:1rem; font-weight:700; }
.subj-meta { font-size:0.7rem; color:var(--muted); margin-top:3px; }
.subj-del {
  background:none; border:none; color:var(--muted); cursor:pointer;
  padding:4px; font-size:1rem; border-radius:6px; flex-shrink:0; margin-top:1px;
}
.subj-del:active { color:var(--accent2); }

.add-card {
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-top: 4px;
}

/* ══════════════════════════════════════
   SCREEN 2 — TOPICS (subject detail)
══════════════════════════════════════ */
.topic-section { margin-bottom: 24px; }
.topic-col-hdr {
  display:flex; align-items:center; gap:8px;
  font-size:0.68rem; text-transform:uppercase; letter-spacing:0.14em;
  padding-bottom:8px; border-bottom:2px solid; margin-bottom:10px;
}
.topic-col-hdr.todo-hdr    { border-color:var(--todo);    color:var(--todo); }
.topic-col-hdr.done-hdr    { border-color:var(--done);    color:var(--done); }
.topic-col-hdr.revised-hdr { border-color:var(--revised); color:var(--revised); }
.col-ct { margin-left:auto; font-size:0.9rem; font-weight:700; }

.topic-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  animation: cardIn 0.2s ease;
}
@keyframes cardIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.topic-name { font-size:0.85rem; margin-bottom:10px; line-height:1.4; }
.topic-btns { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.t-btn {
  font-size:0.65rem; padding:4px 11px; border-radius:99px;
  border:1px solid var(--border); background:none; color:var(--muted);
  cursor:pointer; font-family:'SF Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace;
  text-transform:uppercase; letter-spacing:0.07em; transition:all 0.12s;
  -webkit-tap-highlight-color:transparent;
}
.t-btn:active { transform:scale(0.95); }
.t-done    { border-color:var(--done)!important;    color:var(--done)!important;    background:rgba(106,255,212,0.08)!important; }
.t-revised { border-color:var(--revised)!important; color:var(--revised)!important; background:rgba(124,106,255,0.08)!important; }
.t-del     { color:var(--accent2)!important; border-color:transparent!important; margin-left:auto; }
.t-del:active { background:rgba(255,106,138,0.08)!important; }
.col-empty { font-size:0.75rem; color:var(--muted); padding:4px 2px 6px; }

/* ══════════════════════════════════════
   SCREEN 3 — TIMER
══════════════════════════════════════ */
.timer-hero {
  background: linear-gradient(135deg, rgba(124,106,255,0.12), rgba(106,255,212,0.06));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 20px 24px;
  text-align: center;
  margin-bottom: 16px;
}
.sw-display {
  font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif; font-size:3.8rem; font-weight:700;
  letter-spacing:-0.02em; color:var(--accent3); line-height:1;
  margin-bottom: 24px;
}
.sw-display.running { animation: swPulse 1.8s ease-in-out infinite; }
@keyframes swPulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

.sw-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.sw-btns .btn.lg { font-size:0.8rem; }
.sw-log { grid-column:1/-1; }

.today-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 16px;
}
.today-big { font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif; font-size:2rem; font-weight:700; color:var(--accent); }
.today-sub { font-size:0.72rem; color:var(--muted); margin-top:2px; margin-bottom:10px; }
.today-bar { height:7px; background:var(--border); border-radius:99px; overflow:hidden; }
.today-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent3)); border-radius:99px; transition:width 0.5s ease; }

/* ══════════════════════════════════════
   SCREEN 4 — HISTORY
══════════════════════════════════════ */
.hist-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 8px;
  display: grid;
  grid-template-columns: 68px 1fr 54px;
  align-items: center;
  gap: 12px;
}
.hist-date { font-size:0.72rem; color:var(--muted); }
.hist-date.today { color:var(--accent); font-weight:500; }
.hist-bar-track { height:8px; background:var(--border); border-radius:99px; overflow:hidden; }
.hist-bar-fill { height:100%; border-radius:99px; }
.hist-time { font-size:0.72rem; color:var(--accent3); text-align:right; font-weight:500; }

/* ══════════════════════════════════════
   MODAL / SHEET
══════════════════════════════════════ */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  z-index:200; display:none; align-items:flex-end;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.open { display:flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(var(--safe-b) + 20px);
  width: 100%;
  animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-title { font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif; font-size:1.1rem; font-weight:700; margin-bottom:16px; }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:99px; margin:0 auto 16px; }

/* ══════════════════════════════════════
   SCROLLBAR (desktop fallback)
══════════════════════════════════════ */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
</style>
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header class="app-header">
    <div class="logo">finals<span>.</span></div>
    <div class="hdr-right">
      <span class="hdr-date" id="hdrDate"></span>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme"></button>
    </div>
  </header>

  <!-- ── Screens ── -->
  <div class="screens">

    <!-- SCREEN: Subjects List -->
    <div class="screen active" id="screen-subjects">
      <div class="section-label">My Subjects</div>
      <div id="subjectList"></div>
      <div class="add-card">
        <div class="section-label" style="margin-top:0">Add Subject</div>
        <div class="input-row">
          <input type="text" id="newSubjectInput" placeholder="e.g. Mathematics" />
          <button class="btn primary" onclick="addSubject()">+</button>
        </div>
      </div>
    </div>

    <!-- SCREEN: Topics Detail -->
    <div class="screen" id="screen-topics">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <div id="topicsContent"></div>
    </div>

    <!-- SCREEN: Timer -->
    <div class="screen" id="screen-timer">
      <div class="section-label">Stopwatch</div>
      <div class="timer-hero">
        <div class="sw-display" id="swDisplay">00:00:00</div>
        <div class="sw-btns">
          <button class="btn primary lg" id="swStartStop">Start</button>
          <button class="btn lg" id="swReset">Reset</button>
          <button class="btn lg sw-log" onclick="logSession()" style="background:rgba(106,255,212,0.12);border-color:var(--accent3);color:var(--accent3)">
            ✓ Log Session
          </button>
        </div>
      </div>

      <div class="section-label">Today</div>
      <div class="today-hero">
        <div class="today-big" id="todayBig">0m</div>
        <div class="today-sub">Total study time logged today</div>
        <div class="today-bar"><div class="today-fill" id="todayFill" style="width:0%"></div></div>
      </div>
    </div>

    <!-- SCREEN: History -->
    <div class="screen" id="screen-history">
      <div class="section-label">Study History</div>
      <div id="historyContent"></div>
    </div>

  </div>

  <!-- ── Bottom Nav ── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-subjects" onclick="switchTab('subjects')">
      <span class="nav-icon">📚</span>
      <span>Subjects</span>
    </button>
    <button class="nav-btn" id="nav-timer" onclick="switchTab('timer')">
      <span class="nav-icon">⏱</span>
      <span>Timer</span>
    </button>
    <button class="nav-btn" id="nav-history" onclick="switchTab('history')">
      <span class="nav-icon">📅</span>
      <span>History</span>
    </button>
  </nav>
</div>

<!-- Add Topic Modal -->
<div class="modal-overlay" id="addTopicModal" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Topic</div>
    <div class="input-row" style="margin-bottom:12px">
      <input type="text" id="newTopicInput" placeholder="Topic / chapter name…" />
    </div>
    <button class="btn primary lg" onclick="submitTopic()">Add Topic</button>
    <button class="btn lg ghost" onclick="closeAddTopicModal()" style="margin-top:8px;color:var(--muted)">Cancel</button>
  </div>
</div>

<script>
/* ════════════════════════════════════
   SERVICE WORKER
════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

/* ════════════════════════════════════
   DATA
════════════════════════════════════ */
let data = JSON.parse(localStorage.getItem('finalsTracker') || '{"subjects":{},"dailyLog":{}}');
let activeSubject = null;
let currentTab = 'subjects';

/* ════════════════════════════════════
   UTILS
════════════════════════════════════ */
function save() { localStorage.setItem('finalsTracker', JSON.stringify(data)); }
function pad(n) { return String(n).padStart(2,'0'); }
function todayKey() {
  const d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function fmt(sec) {
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  if(h) return h+'h '+m+'m';
  if(m) return m+'m '+s+'s';
  return s+'s';
}
function fmtShort(sec) {
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60);
  if(h) return h+'h'+(m?' '+m+'m':'');
  if(m) return m+'m';
  return Math.floor(sec)+'s';
}
function fmtDate(key) {
  const [y,mo,d]=key.split('-').map(Number);
  const dt = new Date(y,mo-1,d);
  const today = new Date(); today.setHours(0,0,0,0);
  dt.setHours(0,0,0,0);
  const diff = Math.round((today-dt)/(1000*60*60*24));
  if(diff===0) return 'Today';
  if(diff===1) return 'Yesterday';
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
}
function esc(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function h(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getStats(name) {
  const vals=Object.values(data.subjects[name]?.topics||{});
  const total=vals.length, done=vals.filter(t=>t.status==='done').length, revised=vals.filter(t=>t.status==='revised').length;
  return {total,done,revised,todo:total-done-revised};
}

/* ════════════════════════════════════
   NAVIGATION
════════════════════════════════════ */
function switchTab(tab) {
  if(tab==='subjects' && activeSubject) {
    // go to topics screen instead
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-topics').classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('nav-subjects').classList.add('active');
    currentTab='subjects';
    return;
  }
  currentTab=tab;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='history') renderHistory();
  if(tab==='timer') renderTimer();
}

function openSubject(name) {
  activeSubject = name;
  renderSubjects();
  renderTopics();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-topics').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-subjects').classList.add('active');
}

function goBack() {
  activeSubject = null;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-subjects').classList.add('active');
  renderSubjects();
}

/* ════════════════════════════════════
   SUBJECTS SCREEN
════════════════════════════════════ */
function addSubject() {
  const inp=document.getElementById('newSubjectInput');
  const name=inp.value.trim();
  if(!name) return;
  if(data.subjects[name]){toast('Already exists!');return;}
  data.subjects[name]={topics:{}};
  save(); inp.value='';
  renderSubjects();
  openSubject(name);
}
document.getElementById('newSubjectInput').addEventListener('keydown',e=>{ if(e.key==='Enter') addSubject(); });

function deleteSubject(name) {
  if(!confirm(`Delete "${name}"?`)) return;
  delete data.subjects[name]; save();
  if(activeSubject===name) activeSubject=null;
  renderSubjects();
}

function renderSubjects() {
  const el=document.getElementById('subjectList');
  const names=Object.keys(data.subjects);
  if(!names.length){
    el.innerHTML=`<div class="empty"><div class="e-icon">📖</div><strong>No subjects yet</strong>Add your first subject below to get started.</div>`;
    return;
  }
  el.innerHTML=names.map(name=>{
    const s=getStats(name);
    const wD=s.total?(s.done/s.total)*100:0;
    const wR=s.total?(s.revised/s.total)*100:0;
    const pct=s.total?Math.round((s.done+s.revised)/s.total*100):0;
    return `<div class="subject-card" onclick="openSubject('${esc(name)}')">
      <div style="flex:1;min-width:0;">
        <div class="subj-name">${h(name)}</div>
        <div class="subj-meta">${s.done+s.revised}/${s.total} topics · ${pct}% complete</div>
        <div class="prog-track" style="margin-top:8px">
          <div class="prog-done"    style="width:${wD}%"></div>
          <div class="prog-revised" style="left:${wD}%;width:${wR}%"></div>
        </div>
      </div>
      <button class="subj-del" onclick="event.stopPropagation();deleteSubject('${esc(name)}')">✕</button>
    </div>`;
  }).join('');
}

/* ════════════════════════════════════
   TOPICS SCREEN
════════════════════════════════════ */
function renderTopics() {
  if(!activeSubject||!data.subjects[activeSubject]) return;
  const el=document.getElementById('topicsContent');
  const s=getStats(activeSubject);
  const topics=data.subjects[activeSubject].topics;
  const completed=s.done+s.revised;
  const pct=s.total?Math.round((completed/s.total)*100):0;
  const wD=s.total?(s.done/s.total)*100:0;
  const wR=s.total?(s.revised/s.total)*100:0;
  const pctD=s.total?Math.round(s.done/s.total*100):0;
  const pctR=s.total?Math.round(s.revised/s.total*100):0;
  const ringColor=pct<40?'var(--todo)':pct<80?'var(--warn)':'var(--done)';
  const circ=2*Math.PI*36;
  const off=circ-(pct/100)*circ;

  const todoList   =Object.entries(topics).filter(([,t])=>!t.status||t.status==='todo');
  const doneList   =Object.entries(topics).filter(([,t])=>t.status==='done');
  const revisedList=Object.entries(topics).filter(([,t])=>t.status==='revised');

  el.innerHTML=`
    <!-- Header card -->
    <div class="card" style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
      <div style="flex:1;min-width:0">
        <div style="font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:6px">${h(activeSubject)}</div>
        <div class="pills">
          <span class="pill pill-todo">${s.todo} to do</span>
          <span class="pill pill-done">${s.done} done</span>
          <span class="pill pill-revised">${s.revised} revised</span>
        </div>
      </div>
      <div class="ring-wrap" style="width:80px;height:80px;flex-shrink:0">
        <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
          <circle class="ring-bg"  cx="40" cy="40" r="36"/>
          <circle class="ring-fill" cx="40" cy="40" r="36"
            stroke="${ringColor}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/>
        </svg>
        <div class="ring-lbl" style="font-size:1.15rem">${pct}%<span style="font-size:0.52rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase">done</span></div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
        <span style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted)">Syllabus Progress</span>
        <span style="font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;font-size:1.3rem;font-weight:700;color:${ringColor}">${pct}%</span>
      </div>
      <div class="big-prog-track">
        <div class="prog-done"    style="width:${wD}%"></div>
        <div class="prog-revised" style="left:${wD}%;width:${wR}%"></div>
      </div>
      <div style="display:flex;gap:14px;margin-top:8px;flex-wrap:wrap">
        <span style="font-size:0.68rem;color:var(--muted);display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--done);display:inline-block"></span>${s.done} done (${pctD}%)</span>
        <span style="font-size:0.68rem;color:var(--muted);display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--revised);display:inline-block"></span>${s.revised} revised (${pctR}%)</span>
        <span style="font-size:0.68rem;color:var(--muted);display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--border);display:inline-block"></span>${s.todo} remaining</span>
      </div>
    </div>

    <!-- Add topic button -->
    <button class="btn primary lg" style="margin-bottom:20px" onclick="openAddTopicModal()">+ Add Topic</button>

    <!-- Todo -->
    <div class="topic-section">
      <div class="topic-col-hdr todo-hdr">🔴 Yet to Do <span class="col-ct" style="color:var(--todo)">${s.todo}</span></div>
      ${todoList.length?todoList.map(([id,t])=>topicCard(id,t,'todo')).join(''):'<div class="col-empty">All topics covered 🎉</div>'}
    </div>
    <!-- Done -->
    <div class="topic-section">
      <div class="topic-col-hdr done-hdr">🟢 Done Once <span class="col-ct" style="color:var(--done)">${s.done}</span></div>
      ${doneList.length?doneList.map(([id,t])=>topicCard(id,t,'done')).join(''):'<div class="col-empty">None yet.</div>'}
    </div>
    <!-- Revised -->
    <div class="topic-section">
      <div class="topic-col-hdr revised-hdr">🟣 Revised <span class="col-ct" style="color:var(--revised)">${s.revised}</span></div>
      ${revisedList.length?revisedList.map(([id,t])=>topicCard(id,t,'revised')).join(''):'<div class="col-empty">None yet.</div>'}
    </div>
  `;
}

function topicCard(id,topic,status){
  return `<div class="topic-card">
    <div class="topic-name">${h(topic.name)}</div>
    <div class="topic-btns">
      ${status!=='todo'    ?`<button class="t-btn" onclick="setStatus('${esc(id)}','todo')">↩ To Do</button>`:''}
      ${status!=='done'    ?`<button class="t-btn t-done"    onclick="setStatus('${esc(id)}','done')">✓ Done</button>`:''}
      ${status!=='revised' ?`<button class="t-btn t-revised" onclick="setStatus('${esc(id)}','revised')">★ Revised</button>`:''}
      <button class="t-btn t-del" onclick="deleteTopic('${esc(id)}')">✕</button>
    </div>
  </div>`;
}

/* Add topic modal */
function openAddTopicModal() {
  document.getElementById('addTopicModal').classList.add('open');
  setTimeout(()=>document.getElementById('newTopicInput').focus(),250);
}
function closeAddTopicModal() {
  document.getElementById('addTopicModal').classList.remove('open');
  document.getElementById('newTopicInput').value='';
}
function closeModal(e) { if(e.target===document.getElementById('addTopicModal')) closeAddTopicModal(); }
document.getElementById('newTopicInput').addEventListener('keydown',e=>{ if(e.key==='Enter') submitTopic(); });

function submitTopic(){
  const inp=document.getElementById('newTopicInput');
  const name=inp.value.trim();
  if(!name||!activeSubject) return;
  data.subjects[activeSubject].topics['t_'+Date.now()]={name,status:'todo'};
  save(); closeAddTopicModal();
  renderTopics(); renderSubjects();
}
function setStatus(id,status){
  if(!activeSubject||!data.subjects[activeSubject].topics[id]) return;
  data.subjects[activeSubject].topics[id].status=status;
  save(); renderTopics(); renderSubjects();
}
function deleteTopic(id){
  if(!activeSubject) return;
  delete data.subjects[activeSubject].topics[id];
  save(); renderTopics(); renderSubjects();
}

/* ════════════════════════════════════
   STOPWATCH — with persistence
   • Saves elapsed seconds to localStorage every tick
   • On reopen: restores elapsed time (always paused)
   • On visibility change / beforeunload: pauses & saves
════════════════════════════════════ */
let swRunning=false, swSec=0, swTimer=null;

function swSaveState(){
  localStorage.setItem('swSec', swSec);
  // Never persist running=true — always restore as paused
  localStorage.setItem('swRunning', 'false');
}

function swTick(){
  swSec++;
  renderSW();
  // Save every tick so no second is ever lost
  localStorage.setItem('swSec', swSec);
}

function renderSW(){
  const el=document.getElementById('swDisplay');
  const h2=Math.floor(swSec/3600),m=Math.floor((swSec%3600)/60),s=swSec%60;
  el.textContent=pad(h2)+':'+pad(m)+':'+pad(s);
}

function swPause(){
  if(!swRunning) return;
  swRunning=false;
  clearInterval(swTimer); swTimer=null;
  swSaveState();
  const b=document.getElementById('swStartStop');
  if(b){ b.textContent='Resume'; b.classList.remove('danger'); b.classList.add('primary'); }
  const disp=document.getElementById('swDisplay');
  if(disp) disp.classList.remove('running');
}

document.getElementById('swStartStop').onclick=function(){
  swRunning=!swRunning;
  if(swRunning){
    swTimer=setInterval(swTick,1000);
    this.textContent='Pause'; this.classList.remove('primary'); this.classList.add('danger');
    document.getElementById('swDisplay').classList.add('running');
    localStorage.setItem('swRunning','true');
  } else {
    swPause();
  }
};

document.getElementById('swReset').onclick=function(){
  swPause();
  swSec=0; renderSW(); swSaveState();
  const b=document.getElementById('swStartStop');
  b.textContent='Start'; b.classList.remove('danger'); b.classList.add('primary');
  document.getElementById('swDisplay').classList.remove('running');
};

function logSession(){
  if(swSec<5){toast('Start the stopwatch first!');return;}
  const k=todayKey();
  data.dailyLog[k]=(data.dailyLog[k]||0)+swSec;
  save(); renderTimer(); toast('✓ Logged '+fmt(swSec)+' to today');
  document.getElementById('swReset').click();
}

/* Pause when app goes to background or tab is hidden */
document.addEventListener('visibilitychange', function(){
  if(document.hidden) swPause();
});

/* Pause on page unload (desktop / PWA close) */
window.addEventListener('beforeunload', swPause);

/* iOS PWA: pagehide fires when app is backgrounded */
window.addEventListener('pagehide', swPause);

/* Restore stopwatch state on load */
function swRestoreState(){
  const saved = parseInt(localStorage.getItem('swSec') || '0', 10);
  if(saved > 0){
    swSec = saved;
    renderSW();
    // Show a subtle banner so user knows time was saved
    if(saved >= 5) toast('⏱ Stopwatch restored — ' + fmt(saved) + ' saved');
  }
}
function renderTimer(){
  const k=todayKey();
  const sec=data.dailyLog[k]||0;
  const goal=8*3600;
  document.getElementById('todayBig').textContent=sec?fmt(sec):'0m';
  document.getElementById('todayFill').style.width=Math.min(100,(sec/goal)*100)+'%';
}

/* ════════════════════════════════════
   HISTORY SCREEN
════════════════════════════════════ */
function renderHistory(){
  const el=document.getElementById('historyContent');
  const today=todayKey();
  const all=Object.entries(data.dailyLog).sort((a,b)=>b[0].localeCompare(a[0]));
  if(!all.length){
    el.innerHTML=`<div class="empty"><div class="e-icon">📅</div><strong>No history yet</strong>Log study sessions from the Timer tab.</div>`;
    return;
  }
  const maxSec=all.reduce((m,[,s])=>Math.max(m,s),1);
  // Weekly summary
  const weekSec=all.slice(0,7).reduce((a,[,s])=>a+s,0);
  const totalSec=all.reduce((a,[,s])=>a+s,0);
  const days=all.length;

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div class="card" style="text-align:center">
        <div style="font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent)">${fmt(weekSec)}</div>
        <div style="font-size:0.68rem;color:var(--muted);margin-top:3px">This week</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent3)">${days}</div>
        <div style="font-size:0.68rem;color:var(--muted);margin-top:3px">Days studied</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div class="card" style="text-align:center">
        <div style="font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;font-size:1.4rem;font-weight:700;color:var(--revised)">${fmt(totalSec)}</div>
        <div style="font-size:0.68rem;color:var(--muted);margin-top:3px">Total all time</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;font-size:1.4rem;font-weight:700;color:var(--warn)">${fmt(Math.round(totalSec/Math.max(days,1)))}</div>
        <div style="font-size:0.68rem;color:var(--muted);margin-top:3px">Daily average</div>
      </div>
    </div>
    <div class="section-label">All Sessions</div>
    ${all.map(([key,sec])=>{
      const isToday=key===today;
      const pct=Math.max(4,Math.round((sec/maxSec)*100));
      const color=isToday?'var(--accent)':'var(--accent3)';
      return `<div class="hist-card">
        <div class="hist-date ${isToday?'today':''}">${fmtDate(key)}</div>
        <div class="hist-bar-track"><div class="hist-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="hist-time">${fmtShort(sec)}</div>
      </div>`;
    }).join('')}
  `;
}

/* ════════════════════════════════════
   THEME TOGGLE
════════════════════════════════════ */
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('finalsTheme', isLight ? 'light' : 'dark');
  // Update meta theme-color for browser chrome
  document.querySelector('meta[name="theme-color"]').setAttribute('content', isLight ? '#f0f2f8' : '#0e0f13');
}
// Restore saved theme
(function() {
  if (localStorage.getItem('finalsTheme') === 'light') {
    document.documentElement.classList.add('light');
    document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f0f2f8');
  }
})();

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
document.getElementById('hdrDate').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

renderSubjects();
renderTimer();
swRestoreState();
</script>
