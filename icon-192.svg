<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="40" fill="#16181f"/>
  <rect x="20" y="20" width="152" height="152" rx="28" fill="#1e2029"/>
  <!-- Book icon -->
  <rect x="52" y="54" width="44" height="56" rx="6" fill="#7c6aff" opacity="0.9"/>
  <rect x="96" y="54" width="44" height="56" rx="6" fill="#6affd4" opacity="0.9"/>
  <rect x="52" y="54" width="44" height="56" rx="6" fill="none" stroke="#0e0f13" stroke-width="2"/>
  <rect x="96" y="54" width="44" height="56" rx="6" fill="none" stroke="#0e0f13" stroke-width="2"/>
  <!-- Spine -->
  <rect x="93" y="54" width="6" height="56" fill="#0e0f13"/>
  <!-- Lines on left page -->
  <rect x="60" y="68" width="28" height="3" rx="1.5" fill="#fff" opacity="0.5"/>
  <rect x="60" y="76" width="22" height="3" rx="1.5" fill="#fff" opacity="0.5"/>
  <rect x="60" y="84" width="26" height="3" rx="1.5" fill="#fff" opacity="0.5"/>
