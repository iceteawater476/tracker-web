  <!-- Progress bar at bottom -->
  <rect x="38" y="128" width="116" height="8" rx="4" fill="#2a2d3a"/>
  <rect x="38" y="128" width="74" height="8" rx="4" fill="#7c6aff"/>
  <rect x="38" y="128" width="40" height="8" rx="4" fill="#6affd4"/>
  <!-- Clock dot -->
